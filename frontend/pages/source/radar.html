<!DOCTYPE html>

<meta charset="utf-8">

<title>24Scope Radar</title>

<style>
:root{color-scheme:dark;--bg:#0a0e17;--panel:rgba(10,16,28,.92);--text:#e8f0ff;--muted:#8aa0b8;--cyan:#06b6d4;--border:rgba(122,161,196,.22)}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Segoe UI,IBM Plex Sans,sans-serif}
#app{display:flex;flex-direction:column;height:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(12,20,34,.98),rgba(8,12,22,.96))}
.eyebrow{margin:0;color:var(--cyan);text-transform:uppercase;letter-spacing:.2em;font-size:.7rem;font-weight:700}
.topbar h1{margin:2px 0 0;font-size:1.35rem;letter-spacing:-.03em}
.topbar-right{display:flex;align-items:center;gap:12px}
.pill{padding:6px 12px;border-radius:999px;border:1px solid rgba(6,182,212,.35);background:rgba(6,182,212,.12);color:#b8f4ff;font-size:.85rem;font-weight:600}
.home-link{color:var(--muted);text-decoration:none;font-size:.9rem}
#map-wrap{position:relative;flex:1;min-height:0}#map{width:100%;height:100%;background-color:#0a0e17 !important}
.toolbar{position:absolute;top:12px;left:12px;z-index:1000;display:flex;flex-direction:column;gap:6px}
.tool{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#1a2332;color:#a8bad0;font-size:12px;font-weight:600;cursor:pointer}
.tool.active{background:var(--cyan);color:#0a0e17;border-color:var(--cyan)}
.tool.measure-on{background:#f472b6;color:#0a0e17;border-color:#f472b6}
.measure-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;align-items:center;gap:16px;padding:8px 16px;border:1px solid #f472b6;border-radius:10px;background:rgba(12,18,30,.94);font-size:13px;font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.hidden{display:none!important}
#measure-dist{color:#f472b6}#measure-brg{color:var(--muted)}
#btn-measure-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px}
.selected-panel{position:absolute;top:12px;right:12px;z-index:1000;min-width:180px;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--panel);box-shadow:0 8px 32px rgba(0,0,0,.45)}
.sel-callsign{font-size:1.05rem;font-weight:700;color:#22c55e}
.sel-meta{margin-top:6px;color:var(--muted);font-size:.85rem;line-height:1.45}

/* Leaflet specific overrides */

  background: #0a0e17 !important;
}

}

function projectStudsToLngLat(x, y) {
  const lat = -(y * STUDS_TO_METERS) / 111111;
  const lng = (x * STUDS_TO_METERS) / (111111 * Math.cos(lat * (Math.PI / 180)));
  return [lng, lat];
}

function projectStudsToLatLng(x, y) {
  const [lng, lat] = projectStudsToLngLat(x, y);
  return [lat, lng];
}

function getPlaneIconName(aircraftType) {
  if (AIRCRAFT_TYPE_TO_ICON[aircraftType]) return AIRCRAFT_TYPE_TO_ICON[aircraftType];
  const lower = (aircraftType || "").toLowerCase();
  if (lower.includes("737")) return "plane-737";
  if (lower.includes("747")) return "plane-747";
  if (lower.includes("777")) return "plane-B777";
  if (lower.includes("787")) return "plane-B787";
  if (lower.includes("a320") || lower.includes("a319") || lower.includes("a321")) return "plane-A320";
  if (lower.includes("a330")) return "plane-A330";
  if (lower.includes("a350")) return "plane-A350";
  if (lower.includes("a380")) return "plane-A380";
  if (lower.includes("heli")) return "plane-Hele1";
  if (lower.includes("private") || lower.includes("business")) return "plane-PJ";
  return DEFAULT_PLANE_ICON;
}

function buildVortacIcon() {
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(
    "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 16 16\"><polygon points=\"8,1 15,5 13,13 3,13 1,5\" fill=\"none\" stroke=\"#66bb6a\" stroke-width=\"1.2\"/><circle cx=\"8\" cy=\"8\" r=\"2\" fill=\"#66bb6a\"/></svg>"
  );
}

function haversineNM(lng1, lat1, lng2, lat2) {
  const R = 3440.065;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function computeBearing(lng1, lat1, lng2, lat2) {
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const lat1r = lat1 * Math.PI / 180, lat2r = lat2 * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2r);
  const x = Math.cos(lat1r) * Math.sin(lat2r) - Math.sin(lat1r) * Math.cos(lat2r) * Math.cos(dLng);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

let map = null;
let ready = false;
let showLabels = true;
let measureMode = false;
let measurePoints = [];
let selectedCallsign = null;
let aircraftState = {};
let lastUpdate = performance.now();

let waypointLayers = [];
let vortacLayers = [];
let aircraftMarkers = {};

let measureLine = null;
let measureMarkers = [];

function updateWaypointVisibility() {
  const zoom = map.getZoom();
  if (showLabels && zoom >= 9) {
    waypointLayers.forEach(l => { if (!map.hasLayer(l)) l.addTo(map); });
  } else {
    waypointLayers.forEach(l => { if (map.hasLayer(l)) l.remove(); });
  }
}

function updateVortacVisibility() {
  const zoom = map.getZoom();
  if (showLabels && zoom >= 8) {
    vortacLayers.forEach(l => { if (!map.hasLayer(l)) l.addTo(map); });
  } else {
    vortacLayers.forEach(l => { if (map.hasLayer(l)) l.remove(); });
  }
}

function updateMeasureUi() {
  const bar = document.getElementById("measure-bar");
  if (!measureMode || measurePoints.length !== 2) {
    bar.classList.add("hidden");
    return;
  }
  const [a, b] = measurePoints;
  document.getElementById("measure-dist").textContent = "↗ " + haversineNM(a.lng, a.lat, b.lng, b.lat).toFixed(1) + " NM";
  document.getElementById("measure-brg").textContent = "BRG " + String(Math.round(computeBearing(a.lng, a.lat, b.lng, b.lat))).padStart(3, "0") + "°";
  bar.classList.remove("hidden");
  
  measurePoints.forEach(p => {
    const m = L.circleMarker(p, {
      radius: 5,
      color: '#f472b6',
      fillColor: '#f472b6',
      fillOpacity: 1,
      weight: 2,
      stroke: true
    }).addTo(map);
    measureMarkers.push(m);
  });
  
  measureLine = L.polyline([a, b], {
    color: '#f472b6',
    weight: 2,
    dashArray: '4, 4',
    interactive: false
  }).addTo(map);
}

function normalizeAircraftPayload(data) {
  if (!data) return {};
  if (data.aircraft && typeof data.aircraft === "object") data = data.aircraft;
  const out = {};
  if (Array.isArray(data)) {
    for (const ac of data) {
      const cs = ac.callsign || ac.Callsign || ac.name;
      if (!cs) continue;
      out[cs] = normalizeOneAircraft(cs, ac);
    }
    return out;
  }
  if (typeof data === "object") {
    for (const [cs, ac] of Object.entries(data)) {
      if (!ac || typeof ac !== "object") continue;
      out[cs] = normalizeOneAircraft(cs, ac);
    }
  }
  return out;
}

function normalizeOneAircraft(cs, ac) {
  const pos = ac.position || {};
  return {
    callsign: cs,
    aircraftType: ac.aircraftType || ac.type || ac.AircraftType || "General Aviation",
    heading: ac.heading || ac.Heading || 0,
    altitude: ac.altitude || ac.Altitude || 0,
    groundSpeed: ac.groundSpeed || ac.speed || ac.GroundSpeed || 0,
    isOnGround: !!(ac.isOnGround || ac.onGround),
    position: { x: pos.x || ac.x || 0, y: pos.y || ac.y || 0 }
  };
}

async function fetchAircraft() {
  const urls = [
    "https://ws.awdevhardware.org/acft-data",
    "https://24data.ptfs.app/acft-data"
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) continue;
      const json = await res.json();
      const ac = normalizeAircraftPayload(json);
      if (Object.keys(ac).length > 0) return ac;
    } catch (_) {}
  }
  return null;
}

function seedDemoAircraft() {
  const demo = {};
  const samples = [
    { cs: "AAL427", type: "Boeing 737", x: -2925, y: 20082, hdg: 250, spd: 420, alt: 24000 },
    { cs: "DAL109", type: "Airbus A320", x: -16272, y: 23655, hdg: 90, spd: 390, alt: 28000 },
    { cs: "UAE12", type: "Airbus A380", x: 18105, y: -20409, hdg: 310, spd: 470, alt: 35000 },
    { cs: "JAL81", type: "Boeing 787", x: -7368, y: -31953, hdg: 40, spd: 450, alt: 37000 },
    { cs: "N17GA", type: "General Aviation", x: 5778, y: -4509, hdg: 180, spd: 140, alt: 6500 }
  ];
  for (const s of samples) {
    demo[s.cs] = {
      callsign: s.cs, aircraftType: s.type, heading: s.hdg, altitude: s.alt,
      groundSpeed: s.spd, isOnGround: false, position: { x: s.x, y: s.y }
    };
  }
  return demo;
}

function getAircraftIconHtml(iconName, heading, isSelected) {
  let size = isSelected ? 48 : 36;
  let fill = isSelected ? "#22c55e" : "#06b6d4";
  
  if (iconName === 'aircraft-icon' || iconName === 'DEFAULT_PLANE_ICON' || !iconName.startsWith('plane-')) {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" style="transform: rotate(${heading}deg); transform-origin: center; display: block;"><path d="M12 2L15 10H22L16 14L18 22L12 18L6 22L8 14L2 10H9L12 2Z" fill="${fill}" stroke="#0a0e17" stroke-width="1"/></svg>`;
  } else {
    const file = iconName.substring(6);
    const url = `/Plane%20Icons/${encodeURIComponent(file)}.png`;
    let filterStyle = '';
    if (isSelected) {
      filterStyle = 'filter: drop-shadow(0 0 4px #22c55e) brightness(1.2);';
    }
    return `<img src="${url}" width="${size}" height="${size}" style="transform: rotate(${heading}deg); transform-origin: center; display: block; ${filterStyle}" />`;
  }
}

function renderAircraft() {
  if (!ready) return;
  const elapsed = (performance.now() - lastUpdate) / 1000;
  const currentCallsigns = new Set();
  
  for (const [cs, ac] of Object.entries(aircraftState)) {
    currentCallsigns.add(cs);
    let x = ac.position.x, y = ac.position.y;
    if (!ac.isOnGround && (ac.groundSpeed || 0) > 5 && elapsed < 8) {
      const hdg = ((ac.heading || 0) - 90) * DEG_TO_RAD;
      const spd = (ac.groundSpeed || 0) * STUDS_PER_SEC;
      x += Math.cos(hdg) * spd * elapsed;
      y += Math.sin(hdg) * spd * elapsed;
    }
    const latlng = projectStudsToLatLng(x, y);
    const isSelected = cs === selectedCallsign;
    const iconName = getPlaneIconName(ac.aircraftType || "");
    const size = isSelected ? 48 : 36;
    
    const divIcon = L.divIcon({
      html: getAircraftIconHtml(iconName, ac.heading || 0, isSelected),
      className: 'aircraft-div-icon',
      iconSize: [size, size],
      iconAnchor: [size / 2, size / 2]
    });
    
    let marker = aircraftMarkers[cs];
    if (marker) {
      marker.setLatLng(latlng);
      marker.setIcon(divIcon);
    } else {
      marker = L.marker(latlng, { icon: divIcon }).addTo(map);
      marker.on('click', (e) => {
        if (measureMode) return;
        L.DomEvent.stopPropagation(e);
        selectedCallsign = cs;
        document.getElementById("selected").classList.remove("hidden");
        document.getElementById("sel-cs").textContent = cs;
        document.getElementById("sel-meta").textContent = (ac.aircraftType || "") + " · FL" + Math.round((ac.altitude || 0) / 100) + " · " + Math.round(ac.groundSpeed || 0) + "kt";
        renderAircraft();
      });
      aircraftMarkers[cs] = marker;
    }
    
    if (showLabels) {
      const labelText = cs;
      if (!marker.getTooltip()) {
        marker.bindTooltip(labelText, {
          permanent: true,
          direction: 'bottom',
          className: 'aircraft-label' + (isSelected ? ' selected' : ''),
          offset: [0, size / 2]
        });
      } else {
        marker.setTooltipContent(labelText);
        marker.getTooltip().options.className = 'aircraft-label' + (isSelected ? ' selected' : '');
        marker.getTooltip().options.offset = [0, size / 2];
      }
    } else {
      if (marker.getTooltip()) {
        marker.unbindTooltip();
      }
    }
  }
  
  for (const cs of Object.keys(aircraftMarkers)) {
    if (!currentCallsigns.has(cs)) {
      aircraftMarkers[cs].remove();
      delete aircraftMarkers[cs];
    }
  }
  
  document.getElementById("ac-count").textContent = Object.keys(aircraftMarkers).length + " tracks";
}

async function refreshAircraft() {
  const live = await fetchAircraft();
  aircraftState = live || aircraftState;
  if (!live && Object.keys(aircraftState).length === 0) aircraftState = seedDemoAircraft();
  lastUpdate = performance.now();
  renderAircraft();
}

function initMap() {
  const center = projectStudsToLatLng(-1417, 17840);
  map = L.map('map', {
    center: center,
    zoom: 10,
    maxZoom: 16,
    minZoom: 6,
    zoomControl: false,
    attributionControl: false
  });
  
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  map.on("click", (e) => {
    if (measureMode) return;
    selectedCallsign = null;
    document.getElementById("selected").classList.add("hidden");
    renderAircraft();
  });

  BOUNDARIES.forEach(seg => {
    const latlngs = seg.points.map(([x, y]) => projectStudsToLatLng(x, y));
    L.polyline(latlngs, {
      color: '#1e3a5f',
      weight: 1.5,
      opacity: 0.6,
      interactive: false
    }).addTo(map);
  });

  WAYPOINTS.forEach(wp => {
    const latlng = projectStudsToLatLng(wp.x, wp.y);
    const marker = L.marker(latlng, {
      icon: L.icon({
        iconUrl: buildWaypointIcon(),
        iconSize: [12, 12],
        iconAnchor: [6, 6]
      }),
      interactive: false
    });
    marker.bindTooltip(wp.name, {
      permanent: true,
      direction: 'bottom',
      className: 'wp-label',
      offset: [0, 6]
    });
    waypointLayers.push(marker);
  });

  VORTACS.forEach(v => {
    const latlng = projectStudsToLatLng(v.x, v.y);
    const marker = L.marker(latlng, {
      icon: L.icon({
        iconUrl: buildVortacIcon(),
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      }),
      interactive: false
    });
    const label = v.freq ? (v.id + " " + v.freq) : v.id;
    marker.bindTooltip(label, {
      permanent: true,
      direction: 'bottom',
      className: 'vortac-label',
      offset: [0, 8]
    });
    vortacLayers.push(marker);
  });

  AIRPORTS.forEach(ap => {
    const latlng = projectStudsToLatLng(ap.x, ap.y);
    const marker = L.marker(latlng, {
      icon: L.icon({
        iconUrl: buildAirportIcon(),
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      }),
      interactive: false
    }).addTo(map);
    const label = ap.icao + "<br>" + ap.name;
    marker.bindTooltip(label, {
      permanent: true,
      direction: 'bottom',
      className: 'airport-label',
      offset: [0, 10]
    });
  });

  map.on('zoomend', () => {
    updateWaypointVisibility();
    updateVortacVisibility();
  });

  updateWaypointVisibility();
  updateVortacVisibility();

  map.on("click", (e) => {
    if (!measureMode) return;
    const pt = e.latlng;
    measurePoints = measurePoints.length >= 2 ? [pt] : measurePoints.concat([pt]);
    
    if (measureLine) {
      measureLine.remove();
      measureLine = null;
    }
    measureMarkers.forEach(m => m.remove());
    measureMarkers = [];
    
    if (measurePoints.length < 2) {
      document.getElementById("measure-bar").classList.add("hidden");
      if (measurePoints.length === 1) {
        const m = L.circleMarker(measurePoints[0], {
          radius: 5,
          color: '#f472b6',
          fillColor: '#f472b6',
          fillOpacity: 1,
          weight: 2,
          stroke: true
        }).addTo(map);
        measureMarkers.push(m);
      }
    } else {
      updateMeasureUi();
    }
  });

  ready = true;
  aircraftState = seedDemoAircraft();
  lastUpdate = performance.now();
  renderAircraft();
  refreshAircraft();
  setInterval(refreshAircraft, 4000);
}

document.getElementById("btn-labels").addEventListener("click", () => {
  showLabels = !showLabels;
  const btn = document.getElementById("btn-labels");
  btn.classList.toggle("active", showLabels);
  btn.textContent = showLabels ? "Fixes ON" : "Fixes OFF";
  
  if (showLabels) {
    updateWaypointVisibility();
    updateVortacVisibility();
  } else {
    waypointLayers.forEach(l => { if (map.hasLayer(l)) l.remove(); });
    vortacLayers.forEach(l => { if (map.hasLayer(l)) l.remove(); });
  }
  
  renderAircraft();
});

document.getElementById("btn-measure").addEventListener("click", () => {
  measureMode = !measureMode;
  measurePoints = [];
  if (measureLine) {
    measureLine.remove();
    measureLine = null;
  }
  measureMarkers.forEach(m => m.remove());
  measureMarkers = [];
  
  const btn = document.getElementById("btn-measure");
  btn.classList.toggle("measure-on", measureMode);
  btn.textContent = measureMode ? "Measure ON" : "Measure";
  
  const mapCanvas = map.getContainer();
  mapCanvas.style.cursor = measureMode ? "crosshair" : "";
  document.getElementById("measure-bar").classList.add("hidden");
});

document.getElementById("btn-measure-clear").addEventListener("click", () => {
  measurePoints = [];
  if (measureLine) {
    measureLine.remove();
    measureLine = null;
  }
  measureMarkers.forEach(m => m.remove());
  measureMarkers = [];
  document.getElementById("measure-bar").classList.add("hidden");
});

initMap();
requestAnimationFrame(function tick() { renderAircraft(); requestAnimationFrame(tick); });
</script>
